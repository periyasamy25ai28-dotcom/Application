
<html>
<head>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: sans-serif;
        }

        .bg-image {
            
            background-image: url(IMG_20260210_215111.jpg.jpeg); 
            height: 100%;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
          
        }

        .details-box {
            background-color: rgba(0,0,0, 0.7);
            font-weight: bold;
            border: 3px solid #f1f1f1;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            width: 350px;
            padding: 20px;
            text-align: left;
            border-radius: 15px;
            box-shadow: 0px 0px 15px rgb(0, 255, 85);
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: none;
        }

        h2 {
            text-align: center;
            color: cyan;
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="details-box">
        <h2>Student Details</h2>
        
        <label style="color: red;">Name:</label>
        <input type="text" placeholder="Enter your name ">

        <label style="color: red;">Age:</label>
        <input type="number" placeholder="Enter your age ">

        <label style="color: red;">Department:</label>
        <input type="text">

        <label style="color: red;">Roll Number:</label>
        <input type="text" >

        <button style="width:100%; padding:10px; background:rgb(60, 0, 255); border:none; cursor:pointer; font-weight:bold;">Submit</button>
    </div>

</body>

</html>
